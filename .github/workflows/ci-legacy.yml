name: Legacy App CI

on:
  pull_request:
    paths:
      - 'legacy-app/**'
      - '.github/workflows/ci-legacy.yml'
  push:
    branches: [main]
    paths:
      - 'legacy-app/**'

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-legacy-${{ hashFiles('legacy-app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-legacy-

      - name: Build
        working-directory: legacy-app
        run: mvn compile --batch-mode --fail-at-end

      - name: Test
        working-directory: legacy-app
        run: mvn test --batch-mode
